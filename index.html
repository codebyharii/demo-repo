<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT — Ask anything</title>
<link href="https://fonts.googleapis.com/css2?family=Sohne:wght@300;400;500&family=Söhne+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #212121;
    --sidebar: #171717;
    --surface: #2f2f2f;
    --surface-hover: #3a3a3a;
    --border: #3f3f3f;
    --text: #ececec;
    --muted: #8e8ea0;
    --accent: #f5a623;
    --accent-orange: #f5a623;
    --input-bg: #2f2f2f;
    --radius: 14px;
    --sidebar-w: 260px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Söhne', 'Söhne Buch', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ─── LAYOUT ─── */
  .app { display: flex; height: 100vh; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar);
    display: flex;
    flex-direction: column;
    padding: 10px 8px;
    gap: 2px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px 10px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    user-select: none;
  }

  .brand-logo {
    width: 28px; height: 28px;
    background: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .brand-logo svg { width: 16px; height: 16px; }

  .model-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 15px;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .model-selector:hover { background: var(--surface); }
  .model-selector svg { width: 14px; height: 14px; color: var(--muted); }

  .sidebar-icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    border: none; background: transparent;
  }
  .sidebar-icon-btn:hover { background: var(--surface); color: var(--text); }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

  .sidebar-bottom {
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  .user-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 14px;
  }
  .user-btn:hover { background: var(--surface); }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent-orange);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }

  /* ─── MAIN ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .main-header {
    position: absolute;
    top: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
  }

  .header-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    border: none; background: transparent;
  }
  .header-btn:hover { background: var(--surface); color: var(--text); }

  /* ─── HERO ─── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 680px;
    padding: 0 20px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-title {
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  /* ─── INPUT AREA ─── */
  .input-wrapper {
    width: 100%;
    background: var(--input-bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .input-wrapper:focus-within {
    border-color: #555;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .input-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
  }

  .attach-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    background: none; border: none;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .attach-btn:hover { background: var(--surface-hover); color: var(--text); }

  .chat-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    min-height: 24px;
    max-height: 200px;
    line-height: 1.6;
    caret-color: var(--text);
  }

  .chat-input::placeholder { color: var(--muted); }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .mic-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    background: none; border: none;
    transition: background 0.15s, color 0.15s;
  }
  .mic-btn:hover { background: var(--surface-hover); color: var(--text); }

  .send-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    background: var(--accent);
    border: none;
    color: #fff;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #d4911a; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { background: var(--surface); color: var(--muted); cursor: not-allowed; }

  /* ─── SUGGESTIONS ─── */
  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 680px;
    padding: 0 20px;
    animation: fadeUp 0.4s ease 0.08s both;
  }

  .suggestion-chip {
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    user-select: none;
    white-space: nowrap;
  }
  .suggestion-chip:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: #555;
  }

  /* ─── CHAT AREA (hidden initially) ─── */
  .chat-area {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 120px;
    width: 100%;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .chat-area.active { display: flex; }

  .msg {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 16px 24px;
    animation: fadeUp 0.25s ease both;
  }

  .msg-user {
    display: flex;
    justify-content: flex-end;
  }

  .msg-user .bubble {
    background: var(--surface);
    border-radius: 18px 18px 4px 18px;
    padding: 12px 16px;
    max-width: 80%;
    font-size: 15px;
    line-height: 1.6;
  }

  .msg-ai { display: flex; flex-direction: column; gap: 10px; }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  .ai-logo {
    width: 22px; height: 22px;
    background: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .ai-logo svg { width: 13px; height: 13px; }

  .ai-body {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    padding-left: 30px;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding-left: 30px;
    padding-top: 4px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1s ease infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ─── BOTTOM INPUT (chat mode) ─── */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: var(--sidebar-w); right: 0;
    padding: 16px 24px 20px;
    background: linear-gradient(transparent, var(--bg) 40%);
    display: none;
  }
  .bottom-bar.active { display: block; }
  .bottom-bar .input-wrapper { max-width: 720px; margin: 0 auto; }

  /* ─── FOOTER HINT ─── */
  .footer-hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: -8px;
    animation: fadeUp 0.4s ease 0.16s both;
  }

  /* ─── SCROLLBAR ─── */
  .chat-area::-webkit-scrollbar { width: 5px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 640px) {
    :root { --sidebar-w: 0px; }
    .sidebar { display: none; }
    .bottom-bar { left: 0; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 41 41" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M37.532 16.87a9.963 9.963 0 0 0-.856-8.184 10.078 10.078 0 0 0-10.855-4.835 9.964 9.964 0 0 0-6.212-3.427 10.079 10.079 0 0 0-11.096 4.96 9.962 9.962 0 0 0-6.337 4.814 10.079 10.079 0 0 0 1.24 11.817 9.965 9.965 0 0 0 .856 8.185 10.079 10.079 0 0 0 10.855 4.835 9.965 9.965 0 0 0 6.212 3.426 10.079 10.079 0 0 0 11.096-4.96 9.965 9.965 0 0 0 6.337-4.814 10.079 10.079 0 0 0-1.24-11.817zm-17.096 23.43a7.471 7.471 0 0 1-4.798-1.735c.061-.033.168-.091.237-.134l7.964-4.6a1.294 1.294 0 0 0 .655-1.134V19.054l3.366 1.944a.12.12 0 0 1 .066.092v9.299a7.505 7.505 0 0 1-7.49 7.911zm-16.134-6.892a7.471 7.471 0 0 1-.894-5.023c.06.036.162.099.237.141l7.964 4.6a1.297 1.297 0 0 0 1.308 0l9.724-5.614v3.888a.12.12 0 0 1-.048.103l-8.051 4.649a7.504 7.504 0 0 1-10.24-2.744zM4.297 13.62A7.469 7.469 0 0 1 8.2 10.333c0 .068-.004.19-.004.274v9.201a1.294 1.294 0 0 0 .654 1.132l9.723 5.614-3.366 1.944a.12.12 0 0 1-.114.012L7.044 23.86a7.504 7.504 0 0 1-2.747-10.24zm27.658 6.437l-9.724-5.615 3.367-1.943a.121.121 0 0 1 .114-.012l8.048 4.648a7.498 7.498 0 0 1-1.158 13.528v-9.476a1.293 1.293 0 0 0-.647-1.13zm3.35-5.043c-.059-.037-.162-.099-.236-.141l-7.965-4.6a1.298 1.298 0 0 0-1.308 0l-9.723 5.614v-3.888a.12.12 0 0 1 .048-.103l8.05-4.645a7.497 7.497 0 0 1 11.135 7.763zm-21.063 6.929l-3.367-1.944a.12.12 0 0 1-.065-.092v-9.299a7.497 7.497 0 0 1 12.293-5.756 6.94 6.94 0 0 0-.236.134l-7.965 4.6a1.294 1.294 0 0 0-.654 1.132l-.006 11.225zm1.829-3.943l4.33-2.501 4.332 2.5v4.999l-4.331 2.5-4.331-2.5V18z" fill="currentColor"/>
          </svg>
        </div>
        <span class="model-selector">
          ChatGPT Auto
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>
        </span>
      </div>
      <button class="sidebar-icon-btn" title="New chat" onclick="newChat()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        New chat
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Search chats
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Explore GPTs
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div class="user-btn">
        <div class="avatar">HO</div>
        <span style="font-size:14px;color:var(--text)">Human User</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main">

    <!-- Top-right buttons -->
    <div class="main-header">
      <button class="header-btn" title="Share">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button class="header-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- HERO (landing state) -->
    <div class="hero" id="hero">
      <h1 class="hero-title">What are you working on?</h1>

      <div class="input-wrapper">
        <div class="input-row">
          <button class="attach-btn" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <textarea
            class="chat-input"
            id="heroInput"
            placeholder="Ask anything"
            rows="1"
            onInput="autoResize(this); toggleSend(this, 'heroSend')"
            onKeydown="handleKey(event, 'heroInput')"
          ></textarea>
          <div class="input-actions">
            <button class="mic-btn" title="Voice input">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button class="send-btn" id="heroSend" disabled onclick="submitFromHero()" title="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="footer-hint">ChatGPT can make mistakes. Consider checking important information.</div>
    </div>

    <!-- SUGGESTIONS (below hero input) -->
    <div class="suggestions" id="suggestions" style="margin-top:12px">
      <span class="suggestion-chip" onclick="quickAsk(this)">✍️ Help me write</span>
      <span class="suggestion-chip" onclick="quickAsk(this)">💡 Brainstorm ideas</span>
      <span class="suggestion-chip" onclick="quickAsk(this)">📊 Analyze data</span>
      <span class="suggestion-chip" onclick="quickAsk(this)">🔍 Summarize text</span>
      <span class="suggestion-chip" onclick="quickAsk(this)">💻 Write code</span>
    </div>

    <!-- CHAT MESSAGES -->
    <div class="chat-area" id="chatArea"></div>

    <!-- BOTTOM INPUT BAR (chat mode) -->
    <div class="bottom-bar" id="bottomBar">
      <div class="input-wrapper">
        <div class="input-row">
          <button class="attach-btn" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Ask anything"
            rows="1"
            onInput="autoResize(this); toggleSend(this, 'chatSend')"
            onKeydown="handleKey(event, 'chatInput')"
          ></textarea>
          <div class="input-actions">
            <button class="mic-btn" title="Voice input">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button class="send-btn" id="chatSend" disabled onclick="submitFromChat()" title="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  // ─── STATE ───
  let inChatMode = false;
  const chatArea = document.getElementById('chatArea');
  const hero = document.getElementById('hero');
  const suggestions = document.getElementById('suggestions');
  const bottomBar = document.getElementById('bottomBar');

  // ─── AUTO-RESIZE TEXTAREA ───
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  function toggleSend(el, btnId) {
    document.getElementById(btnId).disabled = !el.value.trim();
  }

  function handleKey(e, inputId) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (inputId === 'heroInput') submitFromHero();
      else submitFromChat();
    }
  }

  // ─── ENTER CHAT MODE ───
  function enterChatMode() {
    if (inChatMode) return;
    inChatMode = true;
    hero.style.display = 'none';
    suggestions.style.display = 'none';
    chatArea.classList.add('active');
    bottomBar.classList.add('active');
    setTimeout(() => document.getElementById('chatInput').focus(), 50);
  }

  // ─── ADD MESSAGE ───
  function addUserMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg msg-user';
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    chatArea.appendChild(div);
    scrollDown();
  }

  function addTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'msg msg-ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="ai-header">
        <div class="ai-logo">${openaiSvg()}</div>
        ChatGPT
      </div>
      <div class="typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    chatArea.appendChild(div);
    scrollDown();
  }

  function replaceTypingWithResponse(text) {
    const el = document.getElementById('typing');
    if (!el) return;
    el.innerHTML = `
      <div class="ai-header">
        <div class="ai-logo">${openaiSvg()}</div>
        ChatGPT
      </div>
      <div class="ai-body" id="streamTarget"></div>`;
    typewriterEffect(document.getElementById('streamTarget'), text);
  }

  function typewriterEffect(el, text) {
    let i = 0;
    el.innerHTML = '';
    const interval = setInterval(() => {
      el.innerHTML += text[i] === '\n' ? '<br>' : escHtml(text[i]);
      i++;
      scrollDown();
      if (i >= text.length) {
        clearInterval(interval);
        document.getElementById('chatSend').disabled = false;
      }
    }, 12);
  }

  function scrollDown() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openaiSvg() {
    return `<svg viewBox="0 0 41 41" width="13" height="13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M37.532 16.87a9.963 9.963 0 0 0-.856-8.184 10.078 10.078 0 0 0-10.855-4.835 9.964 9.964 0 0 0-6.212-3.427 10.079 10.079 0 0 0-11.096 4.96 9.962 9.962 0 0 0-6.337 4.814 10.079 10.079 0 0 0 1.24 11.817 9.965 9.965 0 0 0 .856 8.185 10.079 10.079 0 0 0 10.855 4.835 9.965 9.965 0 0 0 6.212 3.426 10.079 10.079 0 0 0 11.096-4.96 9.965 9.965 0 0 0 6.337-4.814 10.079 10.079 0 0 0-1.24-11.817zm-17.096 23.43a7.471 7.471 0 0 1-4.798-1.735c.061-.033.168-.091.237-.134l7.964-4.6a1.294 1.294 0 0 0 .655-1.134V19.054l3.366 1.944a.12.12 0 0 1 .066.092v9.299a7.505 7.505 0 0 1-7.49 7.911zm-16.134-6.892a7.471 7.471 0 0 1-.894-5.023c.06.036.162.099.237.141l7.964 4.6a1.297 1.297 0 0 0 1.308 0l9.724-5.614v3.888a.12.12 0 0 1-.048.103l-8.051 4.649a7.504 7.504 0 0 1-10.24-2.744zM4.297 13.62A7.469 7.469 0 0 1 8.2 10.333c0 .068-.004.19-.004.274v9.201a1.294 1.294 0 0 0 .654 1.132l9.723 5.614-3.366 1.944a.12.12 0 0 1-.114.012L7.044 23.86a7.504 7.504 0 0 1-2.747-10.24zm27.658 6.437l-9.724-5.615 3.367-1.943a.121.121 0 0 1 .114-.012l8.048 4.648a7.498 7.498 0 0 1-1.158 13.528v-9.476a1.293 1.293 0 0 0-.647-1.13zm3.35-5.043c-.059-.037-.162-.099-.236-.141l-7.965-4.6a1.298 1.298 0 0 0-1.308 0l-9.723 5.614v-3.888a.12.12 0 0 1 .048-.103l8.05-4.645a7.497 7.497 0 0 1 11.135 7.763zm-21.063 6.929l-3.367-1.944a.12.12 0 0 1-.065-.092v-9.299a7.497 7.497 0 0 1 12.293-5.756 6.94 6.94 0 0 0-.236.134l-7.965 4.6a1.294 1.294 0 0 0-.654 1.132l-.006 11.225zm1.829-3.943l4.33-2.501 4.332 2.5v4.999l-4.331 2.5-4.331-2.5V18z" fill="currentColor"/></svg>`;
  }

  // ─── MOCK AI RESPONSES ───
  const mockResponses = {
    "Help me write": "Sure! I'd love to help you write. What kind of content are you working on?\n\n• ✉️ Email or message\n• 📝 Essay or article\n• 📖 Story or creative piece\n• 📄 Report or proposal\n\nJust tell me the topic, tone, and audience, and I'll craft something great for you.",
    "Brainstorm ideas": "Great! Let's brainstorm. What are you trying to come up with ideas for?\n\n• 🚀 Startup or product ideas\n• 🎨 Creative project concepts\n• 📣 Marketing campaigns\n• 🎓 Research topics\n\nShare the context and I'll generate a rich list of possibilities.",
    "Analyze data": "I can help you analyze data! You can:\n\n• 📊 Paste a table or dataset and ask questions\n• 📈 Describe your data and I'll suggest insights\n• 🧮 Ask for statistical analysis or trend identification\n\nShare your data or describe what you're working with to get started.",
    "Summarize text": "Sure — paste the text you'd like summarized and let me know:\n\n• How long the summary should be (one sentence, a paragraph, bullet points)\n• The intended audience\n• Any specific aspects to focus on\n\nI'll distill it down to the key points clearly and concisely.",
    "Write code": "Happy to help with code! Tell me:\n\n• 💻 What language (Python, JS, TypeScript, etc.)\n• 🛠️ What you want to build or fix\n• 📋 Any constraints or requirements\n\nI can write functions, debug issues, explain code, or build full mini-apps.",
  };

  function getResponse(text) {
    const key = Object.keys(mockResponses).find(k => text.toLowerCase().includes(k.toLowerCase()));
    if (key) return mockResponses[key];
    return `That's a great question! You asked: "${text}"\n\nThis is a UI demo of the ChatGPT interface. In a real implementation, this would connect to the OpenAI API and stream back a response based on your query.\n\nYou can try clicking the suggestion chips above — or just keep chatting! 🤖`;
  }

  // ─── SUBMIT ───
  function submitFromHero() {
    const input = document.getElementById('heroInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('heroSend').disabled = true;
    enterChatMode();
    setTimeout(() => sendMessage(text), 60);
  }

  function submitFromChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('chatSend').disabled = true;
    sendMessage(text);
  }

  function sendMessage(text) {
    addUserMsg(text);
    document.getElementById('chatSend').disabled = true;
    setTimeout(() => {
      addTypingIndicator();
      const reply = getResponse(text);
      setTimeout(() => replaceTypingWithResponse(reply), 900);
    }, 300);
  }

  function quickAsk(chip) {
    const text = chip.textContent.replace(/^[^ ]+ /, '');
    document.getElementById('heroInput').value = text;
    submitFromHero();
  }

  function newChat() {
    inChatMode = false;
    chatArea.innerHTML = '';
    chatArea.classList.remove('active');
    bottomBar.classList.remove('active');
    hero.style.display = '';
    suggestions.style.display = '';
    document.getElementById('heroInput').value = '';
    document.getElementById('heroInput').style.height = 'auto';
    document.getElementById('heroSend').disabled = true;
    document.getElementById('heroInput').focus();
  }
</script>
</body>
</html>
